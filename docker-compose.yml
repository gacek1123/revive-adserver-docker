version: '3.8'

services:
  web-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    volumes:
      - revive-data:/var/www/html
    environment:
      - SERVICE_FQDN_PHP_FPM=${COOLIFY_URL}

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - revive-data:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web-app

volumes:
  revive-data: